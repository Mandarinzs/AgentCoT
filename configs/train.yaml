learning_rate: 2.0e-5
num_epochs: 3
batch_size: 4
max_grad_norm: 1.0
output_dir: outputs/agentcot

auto_tune:
  enabled: true
  metric_name: val_loss
  mode: min
  # 目标 SOTA：验证损失越低越好，达到该阈值即停止搜索
  sota_target: 0.25
  max_trials: 12
  learning_rates: [1.0e-5, 1.5e-5, 2.0e-5, 3.0e-5, 5.0e-5]
  epoch_candidates: [1, 2, 3, 4]
